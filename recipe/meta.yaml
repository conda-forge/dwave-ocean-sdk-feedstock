{% set name = "dwave-ocean-sdk" %}
{% set version = "8.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name | replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 7b5271fa8d1e36b7c40ad70abffb74f440adeec41ea0a2fdbc4b2658d33c6d8e

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - pip
    - python >=3.7
    - setuptools >=46.4.0
    - wheel
  run:
    - dwave-gate ==0.3.3
    - dwave-optimization ==0.6.0
    - dwave-samplers ==1.5.0
    - pyqubo ==1.4.0
    - dimod ==0.12.20
    - dwave-cloud-client ==0.13.4
    - dwave-greedy ==0.3.0
    - dwave-hybrid ==0.6.14
    - dwave-inspector ==0.5.3
    - dwave-neal ==0.6.0
    - dwave-networkx ==0.8.17
    - dwave-preprocessing ==0.6.8
    - dwave-system ==1.30.0
    - dwave-tabu ==0.5.0
    - dwavebinarycsp ==0.3.1
    - minorminer ==0.2.18
    - penaltymodel ==1.2.0
    - python >=3.7

test:
  imports:
    - dwaveoceansdk
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/dwavesystems/dwave-ocean-sdk
  summary: Software development kit for open source D-Wave tools
  license: Apache-2.0
  license_file: LICENSE
  doc_url: https://docs.ocean.dwavesys.com

extra:
  recipe-maintainers:
    - BastianZim
